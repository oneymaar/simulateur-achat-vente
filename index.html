// ─── SCORING ───────────────────────────────────────────────────
function scoreProfile(a){
  let v=0,ac=0,c=0;
  const etat=a.bien_etat,dpe=a.bien_dpe,prix=a.bien_prix,est=a.estimation,av=a.avancement_vente;
  const achat=a.projet_achat,crit=a.criteres,timing=a.timing;
  const credit=a.credit_en_cours,apport=a.apport_dispo,relais=a.relais,heb=a.hebergement;
  const stress=a.stress,prio=a.priorite,intuition=a.intuition;

  if(etat==='refait')ac+=2; else if(etat==='travaux'){v+=2;c+=1;}
  if(dpe==='abc')ac+=2; else if(dpe==='ef'){v+=2;c+=1;} else if(dpe==='g'){v+=3;c+=2;}
  if(prix==='sous_marche')ac+=2; else if(prix==='dessus'){v+=2;c+=1;}
  if(est==='non'){v+=1;c+=1;} else if(est==='oui_ancienne')v+=1;
  if(av==='en_vente_agent')ac+=1; else if(av==='en_vente_pap')c+=1; else if(av==='pas_encore')v+=1;
  if(achat==='trouve'){ac+=3;c+=1;} else if(achat==='recherche_active')ac+=1; else if(achat==='debut')v+=2;
  if(crit==='tres_precis'){ac+=2;c+=1;} else if(crit==='flexibles')v+=2;
  if(timing==='urgent')c+=1;
  if(credit==='oui_important'){v+=3;c+=1;} else if(credit==='oui_faible')ac+=1; else if(credit==='non')ac+=2;
  if(apport==='oui')ac+=3; else if(apport==='partiel')ac+=1; else if(apport==='non')v+=2;
  if(relais==='oui_ok')ac+=2; else if(relais==='oui_nok')v+=1;
  if(heb==='famille')v+=1; else if(heb==='location')ac+=1; else if(heb==='non'){ac+=3;c+=1;}
  if(stress==='stresse')v+=1; else if(stress==='serein')ac+=1;
  if(prio==='securite')v+=2; else if(prio==='optimal')ac+=1;

  const total=v+ac||1, pctV=Math.round(v/total*100), pctA=100-pctV;
  let profile;
  if(c>=7)profile='E';
  else if(pctV>60)profile=intuition==='buy_first'?'B_challenge':'B';
  else if(pctA>60)profile=intuition==='sell_first'?'C_challenge':'C';
  else profile='D';

  const isContraint=(profile==='B'||profile==='B_challenge')&&heb==='non';
  const isUrgent=timing==='urgent';
  const noEst=est==='non'||est==='oui_ancienne';
  const notYet=av==='pas_encore'||av==='reflexion';
  const pap=av==='en_vente_pap';
  const base=profile.replace('_challenge','');

  let qualification="🟡 Tiède";
  if(isUrgent&&noEst&&notYet)qualification="🔥 Très chaud — pressé, pas d'estimation, pas encore en vente";
  else if(isUrgent&&notYet)qualification="🔥 Chaud — pressé, pas encore en vente";
  else if(noEst&&base==='B')qualification="🔥 Chaud — vendeur prioritaire sans estimation";
  else if(pap)qualification="🟠 Intéressant — en PAP, potentiel de reprise mandat";
  else if(av==='en_vente_agent')qualification="🟡 Tiède — déjà accompagné";
  else if(achat==='trouve')qualification="🟠 Intéressant — bien achat identifié, décision imminente";

  const profil_label={B:"Vendeur en priorité",B_challenge:"Vendeur en priorité",C:"Acheteur en priorité",C_challenge:"Acheteur en priorité",D:"Opération simultanée",E:"Situation complexe"}[profile]||profile;

  const isContraintCalc=heb==='non';
  const cursorPos=profile==='E'?50:pctV>60?(isContraintCalc?42:Math.round((1-pctV/100)*100)):pctA>60?Math.round(pctA/100*100):50;

  return{profile,vendreScore:v,acheterScore:ac,complexite:c,pctV,pctA,intuition,qualification,
    noEstimation:noEst,sellingPAP:pap,profil_label,isContraint,cursorPos,
    etat,dpe,prix,est,av,achat,crit,timing,credit,apport,relais,heb,stress,prio};
}

// ─── GÉNÉRATION RECOMMANDATION ─────────────────────────────────
function generateRec(sc){
  const{profile,pctV,pctA,intuition,isContraint,etat,dpe,prix,est,av,achat,crit,credit,apport,relais,heb,stress}=sc;
  const base=profile.replace('_challenge','');
  const challenged=profile.includes('_challenge');

  // Liquidité du bien
  const liqPos=[], liqNeg=[];
  if(etat==='refait')liqPos.push('état irréprochable'); else if(etat==='travaux')liqNeg.push('travaux importants');
  if(dpe==='abc')liqPos.push('DPE favorable'); else if(dpe==='ef')liqNeg.push('DPE dégradé (E-F)'); else if(dpe==='g')liqNeg.push('DPE G — passoire thermique');
  if(prix==='sous_marche')liqPos.push('prix attractif'); else if(prix==='dessus')liqNeg.push('prix au-dessus du marché');
  const liqScore=liqPos.length-liqNeg.length;

  // ── NOTRE ANALYSE ──
  let html='';
  html+=mT('🎯','Notre analyse');
  html+=mB("La double opération d'achat-vente que vous projetez est toujours un projet délicat pouvant comporter des risques logistiques et financiers. Il convient d'adopter une stratégie adaptée à votre situation spécifique.");

  let accroche='';
  if(intuition==='unsure'){accroche="Vous hésitiez sur la stratégie à adopter — c'est souvent le signe d'une situation plus nuancée qu'il n'y paraît. L'analyse de vos réponses permet d'y voir plus clair.";}
  else if(!challenged){const lbl=intuition==='sell_first'?'"vendre d\'abord"':'"acheter d\'abord"';accroche=`Votre intuition de ${lbl} se confirme à l'analyse de votre situation. La stratégie recommandée s'appuie sur les spécificités de votre profil — son exécution demande méthode et anticipation.`;}
  else{const wrong=intuition==='sell_first'?"vendre d'abord":"acheter d'abord";const right=intuition==='sell_first'?"acheter en priorité":"vendre en priorité";accroche=`Votre réflexe de "${wrong}" est compréhensible, mais l'analyse de votre situation concrète oriente plutôt vers une stratégie d'**${right}**. Les éléments qui justifient ce choix sont détaillés ci-dessous.`;}
  html+=mB(accroche);

  // ── VOTRE PROFIL ──
  html+=mT('📊','Votre profil');
  let profil='';
  if(isContraint)profil=`L'analyse de votre dossier confirme qu'il faut **vendre avant d'acheter** sur le plan financier — mais votre situation impose une contrainte majeure : **l'absence de solution de repli logistique**. Concrètement, vous ne pouvez pas finaliser la vente de votre bien sans avoir au minimum sécurisé votre prochain logement. Les deux opérations devront donc être **conduites en parallèle et finalisées dans un délai très rapproché**.`;
  else if(base==='B')profil=`L'analyse de votre dossier indique qu'il faut **vendre avant d'acheter** (score ${pctV}%). La structure de votre financement et les caractéristiques de votre bien font de la vente l'opération prioritaire à sécuriser avant de s'engager sur un achat.`;
  else if(base==='C')profil=`L'analyse de votre dossier indique qu'il vaut mieux **acheter avant de vendre** (score ${pctA}%). Votre situation financière et logistique vous donne la marge de manœuvre pour saisir une opportunité d'achat, avant d'enclencher la vente de votre bien actuel.`;
  else if(base==='D')profil=`Votre situation est **équilibrée** entre les deux stratégies (${pctV}% / ${pctA}%). Une opération simultanée est envisageable, mais c'est la démarche la plus exigeante — elle nécessite une synchronisation parfaite et un accompagnement expert. Ne vous y engagez pas sans avoir sécurisé chaque étape.`;
  else profil="Votre situation cumule plusieurs **facteurs de complexité**. Plusieurs scénarios sont envisageables selon des variables que seul un entretien approfondi permettra de peser correctement.";
  html+=mB(profil);

  // ── POURQUOI ──
  html+=mT('💡','Pourquoi cette stratégie ?');
  if(base==='B'){
    if(liqNeg.length>0)html+=mBull(`**Vente potentiellement difficile** (${liqNeg.join(', ')}) — s'engager sur un achat avant d'avoir vendu risque de créer un déséquilibre : vous pourriez vous retrouver avec un achat engagé et une vente qui tarde.`);
    else if(liqPos.length>0)html+=mBull(`**Bien ${liqScore>1?'':'relativement '}liquide** (${liqPos.join(', ')}) — une vente dans de bonnes conditions est raisonnablement anticipable, ce qui limite le risque d'une longue période d'entre-deux.`);
    const finNeg=[];
    if(credit==='oui_important')finNeg.push("crédit immobilier important en cours");
    if(apport==='non')finNeg.push("pas d'apport disponible hors vente");
    if(finNeg.length>0)html+=mBull(`**Financement dépendant de la vente** (${finNeg.join(', ')}) — acheter d'abord vous exposerait à un prêt relais coûteux, ou rendrait simplement le financement de l'achat impossible sans le produit de la cession.`);
    if(achat==='debut')html+=mBull("**Recherche d'achat à peine commencée** — aucune urgence côté achat : prendre le temps de vendre d'abord vous permettra de chercher avec un budget précis et une capacité de négociation renforcée.");
    else if(crit==='flexibles')html+=mBull("**Critères d'achat flexibles** — vous trouverez votre prochain bien rapidement une fois la vente finalisée, ce qui limite le risque d'une longue période de transition.");
    if(isContraint)html+=mBull("**Contrainte logistique critique** — sans solution de repli identifiée, vous ne pouvez pas vous permettre un délai entre la vente et l'entrée dans votre prochain logement. Les deux opérations devront être pilotées en parallèle, avec une attention particulière à la synchronisation des dates de signature.");
  }else if(base==='C'){
    if(liqPos.length>0)html+=mBull(`**Bien ${liqScore>1?'':'relativement '}liquide** (${liqPos.join(', ')}) — vous pouvez raisonnablement anticiper une vente dans de bonnes conditions une fois l'achat sécurisé.`);
    const finPos=[];
    if(apport==='oui')finPos.push("apport disponible");
    if(credit==='non')finPos.push("pas de crédit en cours");
    if(relais==='oui_ok')finPos.push("prêt relais envisageable");
    if(finPos.length>0)html+=mBull(`**Autonomie financière** (${finPos.join(', ')}) — vous disposez des ressources pour acheter d'abord sans être entièrement dépendant du produit de la cession.`);
    if(heb==='non')html+=mBull("**Contrainte logistique** — sans solution d'hébergement entre les deux opérations, vendre d'abord vous exposerait à une période sans logement fixe dans un marché locatif très tendu. Acheter d'abord élimine ce risque.");
    else if(heb==='famille')html+=mBull("**Solution logistique disponible** — votre solution de repli vous offre la flexibilité d'acheter d'abord sans risque logistique immédiat.");
    const diffAchat=[];
    if(crit==='tres_precis')diffAchat.push("critères très précis");
    if(achat==='debut')diffAchat.push("recherche à peine commencée");
    if(diffAchat.length>0)html+=mBull(`**Achat potentiellement long** (${diffAchat.join(', ')}) — commencer la recherche maintenant vous met en position de saisir la bonne opportunité sans avoir la pression d'une vente déjà conclue.`);
    if(achat==='trouve')html+=mBull("**Opportunité concrète identifiée** — vous avez déjà un bien en vue. Attendre d'avoir vendu, c'est risquer de laisser passer cette occasion.");
  }else if(base==='D'){
    html+=mBull("**Situation équilibrée** — ni votre vente ni votre achat ne présente de difficulté nettement supérieure à l'autre, ce qui rend une approche simultanée techniquement envisageable.");
    html+=mBull("**Condition de succès** — une opération simultanée exige une synchronisation parfaite : compromis signés à dates rapprochées, délais de réalisation bien calés, et idéalement un seul interlocuteur capable de coordonner les deux côtés.");
  }

  // ── VIGILANCES ──
  html+=mT('⚠️','Points de vigilance',true);
  const vigs=[];

    else if(heb==='location')vigs.push({p:5,id:'repli_loc',text:"**Logistique de transition incertaine** — une location temporaire à Paris implique souvent un double déménagement, des délais de recherche et des frais d'agence. Ce scénario est moins simple qu'il n'y paraît."});
    if(achat==='trouve')vigs.push({p:8,id:'opp',text:"**Opportunité d'achat identifiée sous pression temporelle** — si vous vendez d'abord, le bien que vous avez en vue risque d'être vendu à un autre acquéreur avant que votre vente ne soit finalisée."});
    if(crit==='tres_precis')vigs.push({p:5,id:'criteres',text:"**Recherche d'achat exigeante** — des critères très précis allongent mécaniquement la durée de recherche. Une fois la vente conclue, la période sans logement fixe pourrait durer plus longtemps que prévu."});
    if(dpe==='ef'||dpe==='g')vigs.push({p:6,id:'dpe_v',text:`**Délai de vente potentiellement long** (DPE ${dpe==='g'?'G':'E-F'}) — les acheteurs exercent une pression à la baisse sur les passoires thermiques. La vente pourrait prendre plus de temps que la moyenne.`});
    if(prix==='dessus')vigs.push({p:5,id:'prix_v',text:"**Prix ambitieux** — un bien affiché au-dessus du marché génère statistiquement des délais de vente plus longs. Chaque semaine de retard impacte le calendrier global de l'opération."});
  }else if(base==='C'){
    if(credit==='oui_important')vigs.push({p:8,id:'credit',text:"**Crédit important en cours** — si la vente prend plus de temps que prévu, la période de portage simultané peut s'avérer financièrement lourde."});
    if(dpe==='ef'||dpe==='g')vigs.push({p:7,id:'dpe_c',text:`**Vente potentiellement longue** (DPE ${dpe==='g'?'G':'E-F'}) — si votre bien met plus de temps à se vendre, la période de portage financier s'en trouve allongée d'autant.`});
    if(prix==='dessus')vigs.push({p:6,id:'prix_c',text:"**Prix au-dessus du marché** — si le délai de vente s'allonge, le coût du portage financier augmente en proportion."});
    if(heb==='location')vigs.push({p:4,id:'location_c',text:"**Solution logistique à confirmer** — une location temporaire à Paris est difficile à trouver rapidement et implique un double déménagement."});
  }else if(base==='D'){
    vigs.push({p:9,id:'simul',text:"**Opération simultanée : complexité maximale** — un décalage même limité entre les deux signatures peut générer des difficultés financières ou logistiques. C'est le scénario le plus exigeant du marché."});
    if(heb==='non')vigs.push({p:8,id:'repli_d',text:"**Aucun filet logistique** — en cas de décalage entre les deux transactions, aucune solution d'hébergement temporaire n'est identifiée à ce stade."});
    if(credit==='oui_important')vigs.push({p:6,id:'credit_d',text:"**Financement sous tension** — le crédit en cours complique le montage financier d'une opération simultanée."});
  }
  vigs.sort((x,y)=>y.p-x.p);

  else if(vigIds.includes('estimation_old'))actions.push("Faites **actualiser votre estimation** auprès d'un agent connaissant le marché actuel du 12ème — les conditions ont évolué depuis votre dernière évaluation.");
  else actions.push("Vérifiez que votre **prix de mise en vente** est cohérent avec le marché actuel du 12ème — une légère surestimation peut coûter plusieurs semaines de délai.");
  actions.push("Contactez un **courtier en financement** pour simuler votre capacité d'emprunt précise, avec et sans le produit de votre vente — c'est le pilier de toute stratégie solide.");
  const mainVig=vigs.filter(v=>!['estimation','estimation_old','courtier'].includes(v.id))[0];
  if(mainVig){
    const id=mainVig.id;
    if(id==='repli')actions.push("**Choisissez et planifiez votre approche logistique** parmi les trois options décrites dans les points de vigilance. Quelle que soit l'option retenue, ne signez pas d'acte de vente définitif sans avoir au préalable sécurisé votre prochain logement.");
    else if(id==='repli_loc')actions.push("**Planifiez concrètement votre transition logistique** : anticipez les délais de recherche d'une location temporaire à Paris (souvent 4 à 8 semaines), le coût réel et la contrainte du double déménagement.");
    else if(id==='opp')actions.push("**Évaluez la disponibilité du vendeur** du bien identifié : s'il peut vous accorder un délai compatible avec votre calendrier de vente, la stratégie recommandée reste tenable. Sinon, la décision mérite d'être réévaluée.");
    else if(id==='criteres')actions.push("**Commencez les visites dès maintenant**, en parallèle de la mise en vente — même sans pouvoir concrétiser immédiatement, vous affinez vos critères et réduisez le délai de décision le moment venu.");
    else if(id==='dpe_v'||id==='dpe_c')actions.push("**Intégrez un délai de vente réaliste** dans votre planification — pour un bien avec ce DPE, anticipez 3 à 6 mois minimum. Calibrez votre stratégie en conséquence.");
    else if(id==='prix_v'||id==='prix_c')actions.push("**Calibrez votre prix de vente avec une marge de négociation intégrée dès le départ** — partez d'un prix cohérent avec le marché plutôt qu'en partant haut pour baisser ensuite, stratégie qui allonge les délais.");
    else if(id==='credit'||id==='credit_d')actions.push("**Modélisez le scénario de portage** avec votre courtier : quel coût mensuel si vous portez les deux crédits pendant 3, 6 ou 9 mois ? Cette simulation vous donnera la limite au-delà de laquelle la stratégie devient trop risquée.");
    else if(id==='simul')actions.push("**Fixez une date cible de déménagement** et travaillez à rebours pour synchroniser les deux transactions — chaque semaine de décalage non anticipé augmente le risque.");
    else if(id==='repli_d')actions.push("**Identifiez une solution d'hébergement de secours** avant d'aller plus loin — même temporaire, elle constitue le filet de sécurité indispensable d'une opération simultanée.");
    else actions.push("**Consultez un expert du marché local** pour arbitrer les scénarios possibles et sécuriser chaque étape de l'opération.");
  }else{
    actions.push("Préparez vos **diagnostics immobiliers** maintenant (DPE, amiante, électricité) — ces démarches prennent souvent plus de temps que prévu.");
  }
  actions.forEach((act,i)=>{ html+=mNum(i+1,act); });

  // ── LA SUITE ──
  html+=mT('💬','La suite');
  let suite='';
  if(isContraint)suite="Votre situation est l'une des plus délicates du marché : vous devez vendre pour des raisons financières, mais vous ne pouvez pas vous retrouver sans logement. Ce type d'opération se pilote à la semaine près. Une conversation de 20 minutes avec un expert qui connaît précisément le marché du 12ème — délais réels, clauses à négocier, mécanismes pour sécuriser les deux transactions en parallèle — peut faire toute la différence entre une opération maîtrisée et une situation subie.";
  else if(base==='D'||base==='E')suite="Cette analyse identifie une situation qui demande une coordination experte. Une conversation de 20 minutes avec un agent connaissant précisément le marché du 12ème — délais réels de vente, mécanismes de financement, clauses à négocier — peut faire toute la différence entre une opération réussie et une situation subie.";
  else suite="Cette analyse est un premier cadrage basé sur vos déclarations. Une conversation de 20 minutes avec un expert du terrain — qui connaît les délais réels de vente dans le 12ème, les mécanismes de financement et les pièges à éviter — peut transformer radicalement votre approche.";
  html+=mB(suite);
  return html;
}

function bold(s){return s.replace(/\*\*([^*]+)\*\*/g,'<strong style="font-weight:700;">$1</strong>');}
function mT(emoji,text,warn=false){const bg=warn?'#fffbeb':'#f0faf5',bc=warn?'#fde68a':G.greenBorder,col=warn?'#92400e':'#166534';return`<div style="display:flex;align-items:center;gap:8px;margin:18px 0 8px;padding:7px 10px;border-radius:6px;background:${bg};border:1px solid ${bc};"><span style="font-size:14px;">${emoji}</span><span style="color:${col};font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;">${text}</span></div>`;}
function mB(text){return`<p style="color:${G.text};font-size:14px;line-height:1.8;margin:0 0 8px;">${bold(text)}</p>`;}
function mBull(text,col='#00A948'){return`<div style="display:flex;gap:8px;margin-bottom:9px;padding-left:2px;"><span style="color:${col};font-weight:700;flex-shrink:0;margin-top:3px;font-size:13px;">•</span><span style="color:${G.text};font-size:13px;line-height:1.75;">${bold(text)}</span></div>`;}
function mNum(n,text){return`<div style="display:flex;gap:10px;margin-bottom:10px;padding-left:2px;"><span style="color:${G.green};font-weight:700;font-size:14px;min-width:16px;flex-shrink:0;">${n}.</span><span style="color:${G.text};font-size:13px;line-height:1.75;">${bold(text)}</span></div>`;}

// ─── TOKEN ─────────────────────────────────────────────────────
function makeToken(data){const p=btoa(unescape(encodeURIComponent(JSON.stringify({...data,ts:Date.now()}))));return p.replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
function parseToken(token){try{const b=token.replace(/-/g,'+').replace(/_/g,'/');return JSON.parse(decodeURIComponent(escape(atob(b))));}catch{return null;}}

        </div>
        <h1 style={{color:G.text,fontSize:'clamp(26px,5vw,42px)',fontWeight:600,lineHeight:1.15,margin:'0 0 8px'}}>Acheter puis vendre —</h1>
        <h1 style={{color:G.green,fontSize:'clamp(26px,5vw,42px)',fontWeight:400,lineHeight:1.15,margin:'0 0 24px'}}>ou l'inverse ?</h1>
        <p style={{color:G.textMuted,fontSize:15,lineHeight:1.75,margin:'0 0 40px'}}>La plupart des acquéreurs-vendeurs pensent connaître la bonne réponse. En réalité, 6 sur 10 sous-estiment au moins un risque majeur dans leur situation.</p>
        <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:40}}>
          {[["⚡","3 minutes","16 questions sur votre situation réelle"],["🧠","Analyse personnalisée","Finance, marché du 12ème et profil psychologique"],["📬","Résultat par email","Votre recommandation complète après confirmation"]].map(([icon,title,desc])=>(
            <div key={title} style={{display:'flex',alignItems:'flex-start',gap:14,padding:'16px 18px',background:G.greenBg,border:`1px solid ${G.greenBorder}`,borderRadius:10}}>
              <span style={{fontSize:20,marginTop:1}}>{icon}</span>
              <div><div style={{color:G.text,fontSize:14,fontWeight:600,marginBottom:2}}>{title}</div><div style={{color:G.textMuted,fontSize:13}}>{desc}</div></div>
            </div>
          ))}
        </div>
        <button onClick={()=>setStep(1)} style={{width:'100%',padding:'18px 32px',background:G.green,color:'#fff',border:'none',borderRadius:10,fontSize:16,fontWeight:700,cursor:'pointer',letterSpacing:'0.02em'}}>Analyser ma situation gratuitement →</button>
        <p style={{color:G.textLight,fontSize:12,textAlign:'center',marginTop:14}}>Résultat envoyé par email · Aucun spam · Par Olivier — Dans le 12</p>
      </div>
    </div>
  );

  // QUESTIONS
  if(step>=1&&step<=total&&currentQ)return(
    <div style={{minHeight:'100vh',background:G.white,display:'flex',flexDirection:'column'}}>
      <Header/>
      <div style={{height:3,background:G.greenBorder}}><div style={{height:'100%',width:`${progress}%`,background:G.green,transition:'width 0.4s ease'}}/></div>
      <div style={{display:'flex',borderBottom:`1px solid ${G.greenBorder}`,overflowX:'auto',padding:'0 16px'}}>
        {blockOrder.map((block,i)=>{const isActive=block===currentBlock,isPast=i<blockProgress;return(
          <div key={block} style={{padding:'10px 14px',fontSize:10,fontWeight:isActive?600:400,letterSpacing:'0.08em',textTransform:'uppercase',color:isActive?G.green:isPast?G.textMuted:G.greenBorder,borderBottom:isActive?`2px solid ${G.green}`:'2px solid transparent',whiteSpace:'nowrap'}}>
            {isPast?'✓ ':''}{blockLabels[block]}
          </div>
        );})}
      </div>
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'32px 24px',opacity:animating?0:1,transform:animating?'translateY(8px)':'translateY(0)',transition:'all 0.25s ease'}}>
        <div style={{maxWidth:540,width:'100%'}}>
          <div style={{color:G.textLight,fontSize:11,fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:8}}>{step} / {total}</div>
          <h2 style={{color:G.text,fontSize:'clamp(17px,3vw,22px)',fontWeight:600,lineHeight:1.4,margin:'0 0 8px'}}>{currentQ.question}</h2>
          {currentQ.sub&&<p style={{color:G.textMuted,fontSize:13,margin:'0 0 28px',lineHeight:1.6}}>{currentQ.sub}</p>}
          {!currentQ.sub&&<div style={{marginBottom:28}}/>}
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {currentQ.options.map(opt=>(
              <button key={opt.value} onClick={()=>handleAnswer(opt.value)}
                style={{display:'flex',alignItems:'center',gap:14,padding:'15px 18px',background:G.white,border:`1.5px solid ${G.greenBorder}`,borderRadius:10,cursor:'pointer',textAlign:'left',width:'100%',transition:'all 0.15s'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=G.green;e.currentTarget.style.background=G.greenBg;}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=G.greenBorder;e.currentTarget.style.background=G.white;}}
              >
                <span style={{fontSize:20,width:28,textAlign:'center',flexShrink:0}}>{opt.icon}</span>
                <span style={{color:G.text,fontSize:14,lineHeight:1.4}}>{opt.label}</span>
              </button>
            ))}
          </div>
          {step>1&&<button onClick={()=>setStep(s=>s-1)} style={{marginTop:20,background:'none',border:'none',color:G.textLight,cursor:'pointer',fontSize:12,padding:0}}>← Retour</button>}
        </div>
      </div>
    </div>
  );

  // EMAIL
  if(step===total+1)return(
    <div style={{minHeight:'100vh',background:G.white}}>
      <Header/>
      <div style={{maxWidth:480,margin:'0 auto',padding:'60px 24px'}}>
        <div style={{width:56,height:56,background:G.greenBg,border:`1.5px solid ${G.greenBorder}`,borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,marginBottom:24}}>🧠</div>
        <h2 style={{color:G.text,fontSize:26,fontWeight:600,margin:'0 0 10px'}}>Votre analyse est prête.</h2>
        <p style={{color:G.textMuted,fontSize:14,lineHeight:1.75,margin:'0 0 32px'}}>Entrez votre email pour recevoir votre recommandation personnalisée. Un lien sécurisé vous sera envoyé pour y accéder.</p>
        <input ref={inputRef} type="email" placeholder="votre@email.com" value={email}
          onChange={e=>{setEmail(e.target.value);setEmailValid(validateEmail(e.target.value));}}
          onKeyDown={e=>e.key==='Enter'&&emailValid&&handleSubmit()}
          style={{width:'100%',padding:'15px 18px',background:G.white,border:`1.5px solid ${emailValid?G.green:G.greenBorder}`,borderRadius:10,color:G.text,fontSize:15,outline:'none',boxSizing:'border-box',marginBottom:14,transition:'border-color 0.2s'}}
        />
        <button onClick={handleSubmit} disabled={!emailValid||loading}
          style={{width:'100%',padding:'17px 32px',background:emailValid?G.green:'#e0e0e0',color:emailValid?'#fff':'#aaa',border:'none',borderRadius:10,fontSize:15,fontWeight:700,cursor:emailValid?'pointer':'not-allowed',letterSpacing:'0.02em'}}>
          {loading?'Envoi en cours...':'Recevoir mon analyse →'}
        </button>
        <p style={{color:G.textLight,fontSize:11,textAlign:'center',marginTop:16}}>Vos données ne sont pas revendues. Un seul email de notre part.</p>
      </div>
    </div>
  );

  // CONFIRMATION
  if(step===total+2)return(
    <div style={{minHeight:'100vh',background:G.white}}>
      <Header/>
      <div style={{maxWidth:480,margin:'0 auto',padding:'60px 24px',textAlign:'center'}}>
        <div style={{width:72,height:72,background:G.greenBg,border:`1.5px solid ${G.greenBorder}`,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:32,margin:'0 auto 24px'}}>📬</div>
        <h1 style={{color:G.text,fontSize:24,fontWeight:600,margin:'0 0 14px',lineHeight:1.3}}>Vérifiez votre email.</h1>
        <p style={{color:G.textMuted,fontSize:14,lineHeight:1.75,margin:'0 0 32px'}}>Un email vient d'être envoyé à <strong style={{color:G.text}}>{email}</strong>.<br/>Cliquez sur le lien pour accéder à votre recommandation complète.</p>
        <div style={{background:G.greenBg,border:`1px solid ${G.greenBorder}`,borderRadius:12,padding:'20px 24px',marginBottom:28,textAlign:'left'}}>
          <div style={{color:G.greenDark,fontSize:11,fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:12}}>Pensez à vérifier</div>
          {[["📥","Votre boîte de réception principale"],["📁","Vos spams / courriers indésirables"],["🔄","Patienter 1 à 2 minutes si nécessaire"]].map(([icon,txt])=>(
            <div key={txt} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
              <span style={{fontSize:16}}>{icon}</span><span style={{color:G.textMuted,fontSize:13}}>{txt}</span>
            </div>
          ))}
        </div>
        <div style={{background:G.white,border:`1px solid ${G.greenBorder}`,borderRadius:12,padding:'20px',marginBottom:20}}>
          <p style={{color:G.textMuted,fontSize:13,margin:'0 0 14px'}}>Vous préférez en discuter directement ?</p>
          <a href={WHATSAPP_URL} target="_blank" rel="noopener noreferrer"
            style={{display:'inline-flex',alignItems:'center',gap:8,padding:'12px 22px',background:'#25d366',color:'#fff',borderRadius:8,textDecoration:'none',fontWeight:600,fontSize:13}}>
            <img src={WA_SRC} alt="WhatsApp" style={{width:20,height:20,borderRadius:4}}/>
            Contacter Olivier
          </a>
        </div>
        <button onClick={reset} style={{background:'none',border:'none',color:G.textLight,cursor:'pointer',fontSize:12}}>↺ Recommencer l'analyse</button>
      </div>
    </div>
  );
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
