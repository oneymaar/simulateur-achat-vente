  priorite:{securite:"Sécurité financière",fluidite:"Fluidité",optimal:"Optimisation"},
};
const h=(k,v)=>labelMap[k]?.[v]||v||"";

function scoreProfile(a){
  let v=0,ac=0,c=0;
  if(a.bien_etat==="refait")v+=2;
  if(a.bien_etat==="travaux"){ac+=1;c+=1;}
  if(a.bien_dpe==="abc")v+=2;
  if(a.bien_dpe==="ef"){ac+=1;c+=2;}
  if(a.bien_dpe==="g"){ac+=2;c+=3;}
  if(a.bien_prix==="sous_marche")ac+=2;
  if(a.bien_prix==="dessus"){v+=1;c+=2;}
  if(a.credit_en_cours==="oui_important"){v+=3;c+=1;}
  if(a.credit_en_cours==="non")ac+=2;
  if(a.apport_dispo==="oui")ac+=3;
  if(a.apport_dispo==="non")v+=2;
  if(a.relais==="oui_ok")ac+=2;
  if(a.hebergement==="famille")ac+=2;
  if(a.hebergement==="non"){ac+=2;c+=1;}
  if(a.projet_achat==="trouve"){ac+=3;c+=1;}
  if(a.projet_achat==="debut")v+=2;
  if(a.criteres==="tres_precis"){ac+=1;c+=2;}
  if(a.criteres==="flexibles")v+=1;
  if(a.timing==="urgent"){v+=1;c+=2;}
  if(a.stress==="stresse")v+=2;
  if(a.stress==="serein")ac+=1;
  if(a.priorite==="securite")v+=2;
  if(a.priorite==="optimal")ac+=1;
  const total=v+ac;
  const ratio=total>0?v/total:0.5;
  let profile;
  if(c>=6)profile="E";
  else if(ratio>0.65)profile=a.intuition==="buy_first"?"B_challenge":"B";
  else if(ratio<0.30)profile=a.intuition==="sell_first"?"C_challenge":"C";
  else profile="D";
  const isUrgent=a.timing==="urgent";
  const noEst=a.estimation==="non"||a.estimation==="oui_ancienne";
  const notYet=a.avancement_vente==="pas_encore"||a.avancement_vente==="reflexion";
  const pap=a.avancement_vente==="en_vente_pap";
  const base=profile.replace("_challenge","");
  let qualification="🟡 Tiède";
  if(isUrgent&&noEst&&notYet)qualification="🔥 Très chaud — pressé, pas d'estimation, pas encore en vente";
  else if(isUrgent&&notYet)qualification="🔥 Chaud — pressé, pas encore en vente";
  else if(noEst&&base==="B")qualification="🔥 Chaud — vendeur prioritaire sans estimation";
  else if(pap)qualification="🟠 Intéressant — en PAP, potentiel de reprise mandat";
  else if(a.avancement_vente==="en_vente_agent")qualification="🟡 Tiède — déjà accompagné";
  else if(a.projet_achat==="trouve")qualification="🟠 Intéressant — bien achat identifié, décision imminente";
  const profil_label={B:"Vendeur en priorité",B_challenge:"Vendeur en priorité",C:"Acheteur en priorité",C_challenge:"Acheteur en priorité",D:"Opération simultanée",E:"Situation complexe"}[profile]||profile;
  return{profile,vendreScore:v,acheterScore:ac,complexite:c,ratio,intuition:a.intuition,qualification,noEstimation:noEst,sellingPAP:pap,profil_label};
}

function generateRec(a,sc){
  const{profile,intuition,noEstimation,sellingPAP}=sc;
  const base=profile.replace("_challenge","");
  const challenged=profile.includes("_challenge");
  const intuitionLabel=intuition==="sell_first"?"vendre d'abord":intuition==="buy_first"?"acheter d'abord":null;
  let accroche="";
  if(!intuitionLabel)accroche="Vous hésitiez sur la stratégie à adopter — c'est souvent le signe d'une situation plus nuancée qu'il n'y paraît. Votre analyse le confirme.";
  else if(!challenged)accroche=`Votre intuition était la bonne. L'analyse de vos ${Object.keys(a).length} critères confirme que la stratégie "${intuitionLabel}" est bien adaptée à votre profil — mais attention, l'exécution est tout.`;
  else{const wrong=intuition==="sell_first"?"vendre d'abord":"acheter d'abord";const right=intuition==="sell_first"?"acheter en priorité":"vendre en priorité";accroche=`Votre réflexe de "${wrong}" est compréhensible — c'est celui de la majorité. Mais à l'analyse de votre situation concrète, la stratégie la plus adaptée est plutôt d'${right}. Voici pourquoi.`;}
  let reco="";
  if(base==="B")reco="Votre profil indique clairement qu'il faut vendre avant d'acheter. Votre montage financier dépend du produit de cession, et tenter d'acheter d'abord vous exposerait à un risque de portage que votre situation ne permet pas d'absorber sereinement.";
  else if(base==="C")reco="Votre profil vous donne une vraie marge de manœuvre pour acheter d'abord si la bonne opportunité se présente. Votre capacité financière autonome et votre flexibilité logistique vous le permettent — à condition de cadrer précisément votre stratégie de vente en parallèle.";
  else if(base==="D")reco="Votre situation est équilibrée : ni clairement en faveur de vendre d'abord, ni d'acheter d'abord. C'est le profil qui bénéficie le plus d'une opération simultanée bien coordonnée — avec une synchronisation précise des deux transactions.";
  else reco="Votre situation cumule plusieurs facteurs de complexité qui rendent une recommandation standardisée insuffisante. Plusieurs scénarios sont envisageables selon des variables que seul un entretien approfondi permettra de peser correctement.";
  const args=[];
  if(a.bien_dpe==="g")args.push("Votre DPE G est aujourd'hui un frein majeur à la vente : les acheteurs exigent des décotes importantes et les délais s'allongent.");
  else if(a.bien_dpe==="ef")args.push("Avec un DPE E ou F, votre bien entre dans la catégorie des passoires thermiques. Le marché parisien actuel pénalise ces biens sur le prix et sur le délai — anticipez une négociation.");
  else if(a.bien_dpe==="abc")args.push("Votre DPE favorable (A-C) est un vrai atout de liquidité sur le marché du 12ème. Les biens bien notés se vendent plus vite et se négocient moins.");
  if(a.bien_prix==="dessus")args.push("Votre prix envisagé au-dessus du marché est le risque numéro un d'enlisement. Dans un marché en ajustement comme celui du 12ème, surestimer son bien coûte des semaines — parfois des mois.");
  else if(a.bien_prix==="sous_marche")args.push("Votre approche prix sous le marché est une force : elle génère de la concurrence et raccourcit le délai de vente, ce qui sécurise l'ensemble du projet.");
  if(a.credit_en_cours==="oui_important")args.push("Avec un capital restant dû important, le produit de votre vente est indispensable pour boucler votre financement. Toute stratégie d'achat avant vente vous expose à un prêt relais dont le coût peut dépasser 15 000€ sur 12 mois.");
  if(a.apport_dispo==="oui")args.push("Votre apport disponible hors vente vous donne une autonomie réelle. C'est ce qui rend un achat préalable envisageable sans mettre en danger votre équilibre financier.");
  if(a.hebergement==="non")args.push("L'absence de solution de repli logistique est une contrainte forte : dans Paris, trouver une location meublée de transition est difficile et coûteux.");
  if(a.projet_achat==="trouve")args.push("Vous avez déjà un bien en vue — c'est une donnée qui change tout. L'opportunité identifiée crée une pression temporelle réelle sur votre côté vendeur.");
  if(a.criteres==="tres_precis")args.push("Vos critères d'achat très précis signifient que trouver le bon bien prendra du temps. Attendre d'avoir vendu pour chercher risque de vous exposer à une période de flottement inconfortable.");
  if(a.stress==="stresse"&&base==="C")args.push("Votre profil prudent mérite d'être pris en compte : si vous achetez d'abord, assurez-vous d'avoir un plan B clair en cas de délai de vente plus long que prévu.");
  const estW=noEstimation?"\n\nÉtape préalable indispensable : votre bien n'a pas encore été estimé par un professionnel — ou cette estimation est trop ancienne pour refléter le marché actuel. Sans prix de vente réaliste, toute stratégie repose sur du sable. C'est la première chose à faire, avant même de prendre d'autres décisions.":"";
  const papW=sellingPAP?"\n\nNote sur votre mise en vente : vous gérez actuellement votre vente en direct. Dans un marché parisien en mouvement comme le 12ème, cela peut allonger les délais et complexifier les négociations — deux facteurs qui peuvent peser sur l'ensemble de votre projet achat-vente.":"";
  const courtier="\n\nUn point souvent négligé : contactez un courtier en financement avant de vous engager sur quoi que ce soit. Connaître précisément votre capacité d'emprunt — avec ou sans le produit de votre vente — est indispensable pour négocier sereinement des deux côtés.";
  let actions="";
  if(base==="B")actions="1. Faites réaliser une estimation sérieuse de votre bien dans les 15 prochains jours — pas une estimation en ligne, une vraie visite avec un agent du secteur. 2. Définissez votre prix de mise en vente avec une marge de négociation intégrée dès le départ. 3. Préparez vos diagnostics immobiliers maintenant — DPE, amiante, électricité — pour ne pas perdre de temps une fois le mandat signé.";
  else if(base==="C")actions="1. Faites simuler votre capacité d'emprunt maximale sans le produit de vente — c'est votre vrai plafond d'achat autonome. 2. Préparez votre dossier de vente en parallèle : estimation, diagnostics, photos. 3. Identifiez précisément le délai entre votre signature achat et votre besoin de fonds — c'est la fenêtre dans laquelle votre vente doit se conclure.";
  else if(base==="D")actions="1. Posez une date cible de déménagement et travaillez à rebours : c'est le seul moyen de synchroniser les deux transactions. 2. Mandatez un agent capable de gérer les deux côtés — la coordination est la clé d'une opération simultanée réussie. 3. Prévoyez une clause de condition suspensive croisée si possible.";
  else actions="1. Listez par ordre de priorité vos contraintes non-négociables (financières, logistiques, timing). 2. Faites estimer votre bien avant tout autre démarche. 3. Consultez un expert qui connaît le marché local pour arbitrer entre les scénarios possibles.";
  const invite="Cette analyse est un premier cadrage basé sur vos déclarations. Une conversation de 20 minutes avec un expert du terrain — qui connaît les délais réels de vente dans le 12ème, les mécanismes de financement et les pièges à éviter — peut transformer radicalement votre approche. C'est exactement ce que je propose.";
  return`${accroche}\n\n${reco}\n\n${args.slice(0,3).join(" ")}${estW}${papW}${courtier}\n\n${actions}\n\n${invite}`;
}

function makeToken(data){
  const payload=btoa(unescape(encodeURIComponent(JSON.stringify({...data,ts:Date.now()}))));
  return payload.replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");
}
function parseToken(token){
  try{const b64=token.replace(/-/g,"+").replace(/_/g,"/");return JSON.parse(decodeURIComponent(escape(atob(b64))));}catch{return null;}
}

  const[emailValid,setEmailValid]=useState(false);
  const[loading,setLoading]=useState(false);

  const total=questions.length;
  const currentQ=step>=1&&step<=total?questions[step-1]:null;
  const progress=step>=1&&step<=total?((step-1)/total)*100:0;
  const currentBlock=currentQ?currentQ.block:null;
  const blockProgress=blockOrder.indexOf(currentBlock);

  const validateEmail=v=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);

  const handleAnswer=value=>{
    if(animating)return;
    setAnimating(true);
    setAnswers(prev=>({...prev,[currentQ.id]:value}));
    setTimeout(()=>{setStep(s=>s+1);setAnimating(false);},250);
  };

  const handleSubmit=async()=>{
    if(!emailValid||loading)return;
    setLoading(true);
    const sc=scoreProfile(answers);
    const rec=generateRec(answers,sc);
    const t=sc.vendreScore+sc.acheterScore;
    const tokenData={profile:sc.profile,profil_label:sc.profil_label,vendreScore:sc.vendreScore,acheterScore:sc.acheterScore,intuition:sc.intuition,rec,ts:Date.now()};

      email,
      intuition:h("intuition",answers.intuition),bien_type:h("bien_type",answers.bien_type),bien_etat:h("bien_etat",answers.bien_etat),
      bien_dpe:h("bien_dpe",answers.bien_dpe),bien_prix:h("bien_prix",answers.bien_prix),estimation:h("estimation",answers.estimation),
      avancement_vente:h("avancement_vente",answers.avancement_vente),credit_en_cours:h("credit_en_cours",answers.credit_en_cours),
      apport_dispo:h("apport_dispo",answers.apport_dispo),relais:h("relais",answers.relais),hebergement:h("hebergement",answers.hebergement),
      projet_achat:h("projet_achat",answers.projet_achat),criteres:h("criteres",answers.criteres),timing:h("timing",answers.timing),
      stress:h("stress",answers.stress),priorite:h("priorite",answers.priorite),
      profil:sc.profile,profil_label:sc.profil_label,
      score_vendre:Math.round((sc.vendreScore/(t||1))*100),score_acheter:Math.round((sc.acheterScore/(t||1))*100),
      complexite:sc.complexite,intuition_challengee:sc.profile.includes("challenge")?"Oui":"Non",qualification:sc.qualification,
    })}).catch(()=>{});

    // EmailJS

      await emailjs.send(EMAILJS_SERVICE_ID,EMAILJS_TEMPLATE_ID,{to_email:email,verify_link:verifyLink,profil_label:sc.profil_label},EMAILJS_PUBLIC_KEY);
    }catch(e){console.error("EmailJS:",e);}

    setLoading(false);
    setStep(total+2);
  };

  const reset=()=>{setStep(0);setAnswers({});setEmail("");};

  // ── LANDING ──
  if(step===0)return(
    <div style={{minHeight:"100vh",background:G.white}}>
      <div style={{textAlign:"center",padding:"32px 24px 0",borderBottom:`1px solid ${G.greenBorder}`}}>
        <img src={LOGO_SRC} alt="Dans le 12" style={{height:120,width:"auto",display:"inline-block"}}/>
        <div style={{color:G.textLight,fontSize:11,fontFamily:"monospace",letterSpacing:"0.12em",textTransform:"uppercase",marginTop:8,paddingBottom:20}}>simulateur.dansle12.fr</div>
      </div>
      <div style={{maxWidth:560,margin:"0 auto",padding:"40px 24px"}}>

        {/* Badge */}
        <div style={{display:"inline-flex",alignItems:"center",gap:8,background:G.greenBg,border:`1px solid ${G.greenBorder}`,borderRadius:20,padding:"6px 14px",marginBottom:28}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:G.green}}/>
          <span style={{color:G.greenDark,fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase"}}>Outil exclusif · Paris 12ème</span>
        </div>

        <h1 style={{color:G.text,fontSize:"clamp(26px,5vw,42px)",fontWeight:600,lineHeight:1.15,margin:"0 0 8px"}}>
          Acheter puis vendre —
        </h1>
        <h1 style={{color:G.green,fontSize:"clamp(26px,5vw,42px)",fontWeight:400,lineHeight:1.15,margin:"0 0 24px"}}>
          ou l'inverse ?
        </h1>

        <p style={{color:G.textMuted,fontSize:15,fontWeight:400,lineHeight:1.75,margin:"0 0 40px"}}>
          La plupart des acquéreurs-vendeurs pensent connaître la bonne réponse. En réalité, 6 sur 10 sous-estiment au moins un risque majeur dans leur situation.
        </p>

        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:40}}>
          {[["⚡","3 minutes","16 questions sur votre situation réelle"],["🧠","Analyse personnalisée","Finance, marché du 12ème et profil psychologique"],["📬","Résultat par email","Votre recommandation complète après confirmation"]].map(([icon,title,desc])=>(
            <div key={title} style={{display:"flex",alignItems:"flex-start",gap:14,padding:"16px 18px",background:G.greenBg,border:`1px solid ${G.greenBorder}`,borderRadius:10}}>
              <span style={{fontSize:20,marginTop:1}}>{icon}</span>
              <div>
                <div style={{color:G.text,fontSize:14,fontWeight:600,marginBottom:2}}>{title}</div>
                <div style={{color:G.textMuted,fontSize:13,fontWeight:400}}>{desc}</div>
              </div>
            </div>
          ))}
        </div>

        <Btn onClick={()=>setStep(1)} full>Analyser ma situation gratuitement →</Btn>
        <p style={{color:G.textLight,fontSize:12,fontWeight:400,textAlign:"center",marginTop:14}}>Résultat envoyé par email · Aucun spam · Par Olivier — Dans le 12</p>
      </div>
    </div>
  );

  // ── QUESTIONS ──
  if(step>=1&&step<=total&&currentQ)return(
    <div style={{minHeight:"100vh",background:G.white,display:"flex",flexDirection:"column"}}>
      <Header/>
      {/* Progress */}
      <div style={{height:3,background:G.greenBorder}}>
        <div style={{height:"100%",width:`${progress}%`,background:G.green,transition:"width 0.4s ease"}}/>
      </div>
      {/* Block nav */}
      <div style={{display:"flex",borderBottom:`1px solid ${G.greenBorder}`,overflowX:"auto",padding:"0 16px"}}>
        {blockOrder.map((block,i)=>{
          const isActive=block===currentBlock;
          const isPast=i<blockProgress;
          return(
            <div key={block} style={{padding:"10px 14px",fontSize:10,fontWeight:isActive?600:300,letterSpacing:"0.08em",textTransform:"uppercase",color:isActive?G.green:isPast?G.textMuted:G.greenBorder,borderBottom:isActive?`2px solid ${G.green}`:"2px solid transparent",whiteSpace:"nowrap",transition:"all 0.2s"}}>
              {isPast?"✓ ":""}{blockLabels[block]}
            </div>
          );
        })}
      </div>
      {/* Question */}
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"32px 24px",opacity:animating?0:1,transform:animating?"translateY(8px)":"translateY(0)",transition:"all 0.25s ease"}}>
        <div style={{maxWidth:540,width:"100%"}}>
          <div style={{color:G.textLight,fontSize:11,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>{step} / {total}</div>
          <h2 style={{color:G.text,fontSize:"clamp(17px,3vw,22px)",fontWeight:600,lineHeight:1.4,margin:"0 0 8px"}}>{currentQ.question}</h2>
          {currentQ.sub&&<p style={{color:G.textMuted,fontSize:13,fontWeight:400,margin:"0 0 28px",lineHeight:1.6}}>{currentQ.sub}</p>}
          {!currentQ.sub&&<div style={{marginBottom:28}}/>}
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {currentQ.options.map(opt=>(
              <button key={opt.value} onClick={()=>handleAnswer(opt.value)}
                style={{display:"flex",alignItems:"center",gap:14,padding:"15px 18px",background:G.white,border:`1.5px solid ${G.greenBorder}`,borderRadius:10,cursor:"pointer",textAlign:"left",width:"100%",transition:"all 0.15s"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=G.green;e.currentTarget.style.background=G.greenBg;}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=G.greenBorder;e.currentTarget.style.background=G.white;}}
              >
                <span style={{fontSize:20,width:28,textAlign:"center",flexShrink:0}}>{opt.icon}</span>
                <span style={{color:G.text,fontSize:14,fontWeight:400,lineHeight:1.4}}>{opt.label}</span>
              </button>
            ))}
          </div>
          {step>1&&<button onClick={()=>setStep(s=>s-1)} style={{marginTop:20,background:"none",border:"none",color:G.textLight,cursor:"pointer",fontSize:12,fontWeight:400,padding:0}}>← Retour</button>}
        </div>
      </div>
    </div>
  );

  // ── EMAIL CAPTURE ──
  if(step===total+1)return(
    <div style={{minHeight:"100vh",background:G.white}}>
      <Header/>
      <div style={{maxWidth:480,margin:"0 auto",padding:"60px 24px"}}>
        <div style={{width:56,height:56,background:G.greenBg,border:`1.5px solid ${G.greenBorder}`,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,marginBottom:24}}>🧠</div>
        <h2 style={{color:G.text,fontSize:26,fontWeight:600,margin:"0 0 10px"}}>Votre analyse est prête.</h2>
        <p style={{color:G.textMuted,fontSize:14,fontWeight:400,lineHeight:1.75,margin:"0 0 32px"}}>
          Entrez votre email pour recevoir votre recommandation personnalisée. Un lien sécurisé vous sera envoyé pour y accéder.
        </p>
        <input ref={inputRef} type="email" placeholder="votre@email.com" value={email}
          onChange={e=>{setEmail(e.target.value);setEmailValid(validateEmail(e.target.value));}}
          onKeyDown={e=>e.key==="Enter"&&emailValid&&handleSubmit()}
          style={{width:"100%",padding:"15px 18px",background:G.white,border:`1.5px solid ${emailValid?G.green:G.greenBorder}`,borderRadius:10,color:G.text,fontSize:15,fontWeight:400,outline:"none",boxSizing:"border-box",marginBottom:14,transition:"border-color 0.2s"}}
        />
        <Btn onClick={handleSubmit} disabled={!emailValid||loading} full>
          {loading?"Envoi en cours...":"Recevoir mon analyse →"}
        </Btn>
        <p style={{color:G.textLight,fontSize:11,fontWeight:400,textAlign:"center",marginTop:16}}>Vos données ne sont pas revendues. Un seul email de notre part.</p>
      </div>
    </div>
  );

  // ── CONFIRMATION ──
  if(step===total+2)return(
    <div style={{minHeight:"100vh",background:G.white}}>
      <Header/>
      <div style={{maxWidth:480,margin:"0 auto",padding:"60px 24px",textAlign:"center"}}>
        <div style={{width:72,height:72,background:G.greenBg,border:`1.5px solid ${G.greenBorder}`,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,margin:"0 auto 24px"}}>📬</div>
        <h1 style={{color:G.text,fontSize:24,fontWeight:600,margin:"0 0 14px",lineHeight:1.3}}>Vérifiez votre email.</h1>
        <p style={{color:G.textMuted,fontSize:14,fontWeight:400,lineHeight:1.75,margin:"0 0 32px"}}>
          Un email vient d'être envoyé à <strong style={{color:G.text,fontWeight:600}}>{email}</strong>.<br/>
          Cliquez sur le lien pour accéder à votre recommandation complète.
        </p>
        <div style={{background:G.greenBg,border:`1px solid ${G.greenBorder}`,borderRadius:12,padding:"20px 24px",marginBottom:28,textAlign:"left"}}>
          <div style={{color:G.greenDark,fontSize:11,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:12}}>Pensez à vérifier</div>
          {[["📥","Votre boîte de réception principale"],["📁","Vos spams / courriers indésirables"],["🔄","Patienter 1 à 2 minutes si nécessaire"]].map(([icon,txt])=>(
            <div key={txt} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <span style={{fontSize:16}}>{icon}</span>
              <span style={{color:G.textMuted,fontSize:13,fontWeight:400}}>{txt}</span>
            </div>
          ))}
        </div>
        <div style={{background:G.white,border:`1px solid ${G.greenBorder}`,borderRadius:12,padding:"20px",marginBottom:20}}>
          <p style={{color:G.textMuted,fontSize:13,fontWeight:400,margin:"0 0 14px"}}>Vous préférez en discuter directement ?</p>
          <a href={WHATSAPP_URL} target="_blank" rel="noopener noreferrer"
            style={{display:"inline-flex",alignItems:"center",gap:8,padding:"12px 22px",background:"#25d366",color:G.white,borderRadius:8,textDecoration:"none",fontWeight:600,fontSize:13,fontFamily:"'Montserrat',sans-serif"}}>
            <img src={WA_SRC} alt="WhatsApp" style={{width:20,height:20,borderRadius:4}}/>
            Contacter Olivier
          </a>
        </div>
        <button onClick={reset} style={{background:"none",border:"none",color:G.textLight,cursor:"pointer",fontSize:12,fontWeight:400}}>↺ Recommencer l'analyse</button>
      </div>
    </div>
  );

  return null;
}

function App(){
  const urlParams=new URLSearchParams(window.location.search);
  const tokenParam=urlParams.get("token");
  if(tokenParam)return <ResultPage token={tokenParam}/>;
  return <Simulateur/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
